<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Signal — 6–12 April 2026 · Lando Edition</title>
<meta name="description" content="Issue #2 of The Signal, reimagined in a high-contrast motion-forward visual language inspired by landonorris.com.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles-lando-1.css">
<link rel="stylesheet" href="../assets/styles-lando-2.css">
<link rel="stylesheet" href="../assets/styles-lando-3.css">
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.42/dist/lenis.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" defer></script>
<style>
  .lando-boot { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0A0A0C; color:#D2FF00; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:3px; text-transform:uppercase; }
  .lando-boot::after { content:'·'; animation: lando-dots 1.4s steps(4, end) infinite; margin-left:6px; }
  @keyframes lando-dots { 0%{content:'·'} 25%{content:'··'} 50%{content:'···'} 75%{content:'····'} 100%{content:'·'} }
</style>
</head>
<body>
<div id="landoBoot" class="lando-boot">Loading Issue 02</div>
<script>
(function () {
  var base = 'lando-parts/';
  var count = 9;
  var urls = [];
  for (var i = 1; i <= count; i++) urls.push(base + 'p' + i + '.html');

  Promise.all(urls.map(function (u) {
    return fetch(u).then(function (r) {
      if (!r.ok) throw new Error('fetch failed: ' + u);
      return r.text();
    });
  })).then(function (parts) {
    var boot = document.getElementById('landoBoot');
    if (boot) boot.remove();
    var wrap = document.createElement('div');
    wrap.innerHTML = parts.join('\n');
    while (wrap.firstChild) document.body.appendChild(wrap.firstChild);
    var s = document.createElement('script');
    s.src = '../assets/script-lando.js';
    document.body.appendChild(s);
  }).catch(function (err) {
    var boot = document.getElementById('landoBoot');
    if (boot) boot.textContent = 'Failed to load: ' + err.message;
    console.error(err);
  });
})();
</script>
</body>
</html>
