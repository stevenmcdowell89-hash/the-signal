<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Signal — Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A2E;
      color: #E8E8E8;
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .archive-container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .masthead {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 3rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #E94560, #FF6B35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .issue-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .issue-link {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #16213E;
      border-radius: 8px;
      text-decoration: none;
      color: #E8E8E8;
      transition: background 0.2s, transform 0.2s;
      text-align: left;
    }
    .issue-link:hover {
      background: #2D2D3A;
      transform: translateY(-2px);
    }
    .issue-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 0.25rem;
    }
    .issue-meta {
      font-size: 0.85rem;
      color: #888;
    }
    .issue-accent {
      color: #E94560;
    }
  </style>
</head>
<body>
  <div class="archive-container">
    <div class="masthead">The Signal</div>
    <div class="tagline">Weekly Intelligence Brief</div>
    <ul class="issue-list">
      <li>
        <a href="issues/countdown-efteling.html" class="issue-link">
          <div class="issue-title">The Countdown <span class="issue-accent">— Efteling & Beekse Bergen</span></div>
          <div class="issue-meta">100 Days Out · 21 March 2026</div>
        </a>
      </li>
      <li>
        <a href="issues/issue-1.html" class="issue-link">
          <div class="issue-title">Issue <span class="issue-accent">#1</span></div>
          <div class="issue-meta">15–21 March 2026</div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
